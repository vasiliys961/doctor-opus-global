name: Deploy to Timeweb VPS (manual only)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
                    cd /home/doctor-opus-en
          
          echo "📥 Получение изменений с GitHub..."
          git pull origin main
          
          echo "🚀 Сборка и перезапуск через Docker Compose..."
          docker compose up -d --build
          
          echo "⏳ Ожидание запуска приложения (30 сек)..."
          sleep 30
          
          echo "🔄 Запуск миграции БД..."
          # Миграция через API с секретом из .env
          MIGRATION_SECRET=$(grep -oP 'MIGRATION_SECRET=\K.*' .env 2>/dev/null || echo "")
          if [ -n "$MIGRATION_SECRET" ]; then
                            RESULT=$(curl -s -X POST http://localhost:3001/api/admin/migrate \
              -H "Content-Type: application/json" \
              -d "{\"secret\": \"$MIGRATION_SECRET\"}" || echo '{"error":"curl failed"}')
            echo "Миграция: $RESULT"
          else
            echo "⚠️ MIGRATION_SECRET не задан в .env, пропускаем миграцию"
          fi
          
          echo "✅ Деплой v3.42.0 завершен!"
